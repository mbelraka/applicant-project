name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'patches/**'
            backend:
              - 'backend/**'
            lockfile:
              - 'package.json'
              - 'package-lock.json'

  lockfile:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.lockfile == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Use npm from packageManager (npm@10.9.2)
        run: |
          corepack enable
          corepack prepare npm@10.9.2 --activate
      - name: Verify package-lock.json matches package.json
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json

  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.lockfile == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Use npm from packageManager (npm@10.9.2)
        run: |
          corepack enable
          corepack prepare npm@10.9.2 --activate
      - run: npm ci
      - name: Frontend CI
        run: npm run validate:ci:frontend

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version-file: backend/.java-version
          cache: maven
          cache-dependency-path: |
            backend/pom.xml
            backend/.mvn/wrapper/maven-wrapper.properties
      - name: Use npm from packageManager (npm@10.9.2)
        run: |
          corepack enable
          corepack prepare npm@10.9.2 --activate
      - run: npm ci
      - name: Backend CI
        run: npm run validate:ci:backend
