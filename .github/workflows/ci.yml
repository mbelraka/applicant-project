name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # Match package.json "packageManager": otherwise a newer npm rewrites the
      # lockfile (optional peers, etc.) and the verify step fails with a false diff.
      - name: Use npm from packageManager (npm@10.9.2)
        run: |
          corepack enable
          corepack prepare npm@10.9.2 --activate
          npm --version

      - name: Verify package-lock.json matches package.json
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Quality, tests, doctor, security, letify, and production build
        run: npm run validate:ci
