<div class="applicant-grid">
  <div class="applicant-grid__scroll">
    <div
      class="applicant-grid__cards"
      #cardsMeasure
      [style.--applicant-grid-cols]="columnsPerRow()"
    >
      @for (
        applicant of pagedApplicants();
        track applicant.id;
        let idx = $index
      ) {
        <app-applicant-grid-card
          class="applicant-grid__card"
          [applicant]="applicant"
          [clickable]="true"
          [showDeleteAction]="true"
          [animationDelayMs]="cardEnterDelayMs(idx)"
          [skillVariant]="'filter-chip'"
          (cardSelected)="onCardClick($event)"
          (deleteRequested)="confirmRemoveApplicant($event)"
          (skillSelected)="filterBySkill($event)"
        >
        </app-applicant-grid-card>
      }
    </div>
  </div>
  @if (applicants().length > 0) {
    <app-applicants-pagination
      [pageCount]="pageCount()"
      [pageIndex]="pageIndex()"
      [pageNumbers]="pageNumbers()"
      (pageChange)="goToPage($event)"
    ></app-applicants-pagination>
  }
</div>
