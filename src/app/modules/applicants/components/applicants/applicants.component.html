<div class="applicants-container" fxFlex="1 1 auto" fxLayout="column">
  @let viewType = viewType$ | async;
  <div
    fxLayout="row"
    fxLayoutAlign="space-between center"
    class="header"
    fxLayoutGap="24px"
  >
    <mat-form-field appearance="outline" fxFlex=" 1 1 auto">
      <mat-label>{{ 'applicants.searchLabel' | translate }}</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        [value]="globalFilter$ | async"
        [placeholder]="'applicants.searchPlaceholder' | translate"
      />
    </mat-form-field>
    <button mat-flat-button class="-no-wrap" (click)="openForm()">
      {{ 'applicants.newApplicant' | translate }}
    </button>
  </div>
  <div class="content" fxLayout="column" fxLayoutGap="24px">
    <div class="options" fxLayoutAlign="center">
      <mat-button-toggle-group
        [value]="viewType"
        (change)="toggleView($event.value)"
        [attr.aria-label]="'applicants.viewToggle' | translate"
      >
        <mat-button-toggle [value]="viewTypes.GRID">
          {{ 'applicants.gridView' | translate }}
        </mat-button-toggle>
        <mat-button-toggle [value]="viewTypes.LIST">
          {{ 'applicants.listView' | translate }}
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>
    <div *ngIf="viewType === viewTypes.GRID">
      <app-applicant-grid></app-applicant-grid>
    </div>

    <div *ngIf="viewType === viewTypes.LIST">
      <app-applicant-list></app-applicant-list>
    </div>
  </div>
</div>
