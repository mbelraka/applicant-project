<table
  mat-table
  [dataSource]="(applicants$ | async) ?? []"
  class="mat-elevation-z8"
>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{ 'applicantList.name' | translate }}</th>
    <td mat-cell *matCellDef="let applicant">{{ applicant.name }}</td>
  </ng-container>

  <ng-container matColumnDef="availability">
    <th mat-header-cell *matHeaderCellDef>
      {{ 'applicantList.availability' | translate }}
    </th>
    <td mat-cell *matCellDef="let applicant">
      {{ applicant.availableFrom | localeDate }}
    </td>
  </ng-container>

  <ng-container matColumnDef="skills">
    <th mat-header-cell *matHeaderCellDef>{{ 'applicantList.skills' | translate }}</th>
    <td mat-cell *matCellDef="let applicant">
      <button
        mat-button
        *ngFor="let skill of applicant.skills"
        (click)="filterBySkill(skill)"
      >
        {{ skill }}
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
