<div class="root-container" fxFlex="1 1 auto" fxLayoutAlign="center">
  <div class="root-content" fxFlex="1 1 auto" fxLayout="column">
    <div
      animate.enter="fade-shell-enter"
      animate.leave="fade-shell-leave"
      fxLayout="row"
      fxLayoutAlign="space-between center"
      class="header"
    >
      <div
        class="header-leading"
        fxLayout="row"
        fxLayoutAlign="start center"
        fxLayoutGap="32px"
      >
        <a
          [routerLink]="landingRoute"
          class="logo-link"
          [attr.aria-label]="'nav.main' | translate"
        >
          <span class="logo"></span>
        </a>

        <div class="nav-container">
          <nav
            mat-tab-nav-bar
            class="main-nav"
            [tabPanel]="tabPanel"
            disablePagination
            color="accent"
          >
            @for (link of navLinks; track link.link) {
              <a
                mat-tab-link
                class="tab-link"
                routerLinkActive
                #mainNavbar="routerLinkActive"
                [active]="mainNavbar.isActive"
                [routerLink]="link.link"
              >
                {{ link.translationKey | translate }}
              </a>
            }
          </nav>
          <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
        </div>
      </div>

      <mat-form-field
        appearance="outline"
        class="form-field--palette-secondary"
        subscriptSizing="dynamic"
      >
        <mat-icon matPrefix aria-hidden="true">language</mat-icon>
        <mat-select
          panelClass="select-panel--palette-secondary"
          [attr.aria-label]="'language.label' | translate"
          [value]="language$ | async"
          (selectionChange)="onLanguageChange($event.value)"
        >
          @for (lang of supportedLanguages; track lang) {
            <mat-option [value]="lang">
              {{ 'language.names.' + lang | translate }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="full-container" fxFlex="1 1 auto">
      <router-outlet></router-outlet>
    </div>
    <footer
      animate.enter="fade-shell-enter"
      animate.leave="fade-shell-leave"
      fxLayout="row nowrap"
      fxLayoutAlign="center center"
      class="footer"
    >
      {{ 'footer.copyright' | translate }}
    </footer>
  </div>
</div>
