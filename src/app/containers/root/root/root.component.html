<div class="root-container" fxFlex="1 1 auto" fxLayoutAlign="center">
  <div class="root-content" fxFlex="1 1 auto" fxLayout="column">
    <div
      @fadeInOutAnimation
      fxLayout="row"
      fxLayoutAlign="space-between center"
      class="header"
    >
      <div class="logo"></div>

      <div
        class="nav-container"
        fxLayout="row"
        fxLayoutAlign="end center"
        fxLayoutGap="16px"
      >
        <nav
          mat-tab-nav-bar
          class="main-nav"
          [tabPanel]="tabPanel"
          disablePagination
          color="accent"
        >
          @for (link of navLinks; track link.link) {
            <a
              mat-tab-link
              class="tab-link"
              routerLinkActive
              #mainNavbar="routerLinkActive"
              [active]="mainNavbar.isActive"
              [routerLink]="link.link"
            >
              {{ link.translationKey | translate }}
            </a>
          }
        </nav>
        <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>

        <mat-form-field
          appearance="outline"
          class="language-select"
          subscriptSizing="dynamic"
        >
          <mat-label>{{ 'language.label' | translate }}</mat-label>
          <mat-select
            [value]="language$ | async"
            (selectionChange)="onLanguageChange($event.value)"
          >
            @for (lang of supportedLanguages; track lang) {
              <mat-option [value]="lang">
                {{ ('language.names.' + lang) | translate }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <div class="full-container" fxFlex="1 1 auto">
      <router-outlet></router-outlet>
    </div>
    <footer
      @fadeInOutAnimation
      fxLayout="row nowrap"
      fxLayoutAlign="center center"
      class="footer"
    >
      {{ 'footer.copyright' | translate }}
    </footer>
  </div>
</div>
